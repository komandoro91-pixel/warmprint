  <text x="104" y="380" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="#A0855C" letter-spacing="0">вещи, которые приносят радость и уют</text>
  <!-- Bottom label -->
  <text x="104" y="558" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="22" fill="#3A4A3C" opacity="0.45" letter-spacing="2">СЕМЕЙНАЯ МАСТЕРСКАЯ 3D-ПЕЧАТИ</text>
