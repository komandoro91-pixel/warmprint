  <circle cx="980" cy="315" r="260" fill="#3A4A3C" opacity="0.06"/>
  <circle cx="980" cy="315" r="180" fill="#3A4A3C" opacity="0.06"/>
  <!-- Logo wordmark -->
  <text x="100" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="112" font-weight="400" fill="#3A4A3C" letter-spacing="-2">warmprint</text>
