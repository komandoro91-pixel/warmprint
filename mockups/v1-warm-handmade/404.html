<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Страница не найдена | warmprint</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FAF7F2;
      --green: #3A4A3C;
      --terracotta: #C8956D;
      --warm-brown: #A0855C;
    }

    body {
      background: var(--cream);
      color: var(--green);
      font-family: -apple-system, "Inter", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      font-family: Georgia, serif;
      font-size: 1.5rem;
      color: var(--green);
      text-decoration: none;
      margin-bottom: 3rem;
      display: block;
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--terracotta); }

    .code {
      font-family: Georgia, serif;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 400;
      line-height: 1;
      color: var(--green);
      opacity: 0.12;
      user-select: none;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 400;
      margin-bottom: 1rem;
      color: var(--green);
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--warm-brown);
      max-width: 380px;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      background: var(--green);
      color: var(--cream);
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 500;
      transition: opacity 0.2s ease;
    }

    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <a href="/" class="logo">warm<span>print</span></a>

  <div class="code" aria-hidden="true">404</div>

  <h1>Страница не найдена</h1>
  <p>Возможно, ссылка устарела или страница была перемещена. Вернитесь на главную — там всё самое интересное.</p>

  <a href="/" class="btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Вернуться на главную
  </a>
</body>
</html>
